##### ─────────────────────────────────────────
##### Core behaviour
##### ─────────────────────────────────────────

set -g mouse on
set-option -g set-clipboard on

# Workspaces should not shift numbers
set -g renumber-windows off

# Enable focus events (useful later)
set -g focus-events on


##### ─────────────────────────────────────────
##### Workspace-style windows (Alt + number)
##### Alt+1 → window 0, Alt+2 → window 1, etc
##### Creates window if missing
##### ─────────────────────────────────────────

bind -n M-1 if-shell "tmux select-window -t 0" "" "new-window -t 0"
bind -n M-2 if-shell "tmux select-window -t 1" "" "new-window -t 1"
bind -n M-3 if-shell "tmux select-window -t 2" "" "new-window -t 2"
bind -n M-4 if-shell "tmux select-window -t 3" "" "new-window -t 3"
bind -n M-5 if-shell "tmux select-window -t 4" "" "new-window -t 4"
bind -n M-6 if-shell "tmux select-window -t 5" "" "new-window -t 5"
bind -n M-7 if-shell "tmux select-window -t 6" "" "new-window -t 6"
bind -n M-8 if-shell "tmux select-window -t 7" "" "new-window -t 7"
bind -n M-9 if-shell "tmux select-window -t 8" "" "new-window -t 8"


##### Window chooser (Alt+w)
bind -n M-w choose-window


##### ─────────────────────────────────────────
##### Status bar (top, ethereal)
##### ─────────────────────────────────────────

set -g status on
set -g status-position top
set -g status-interval 2

set -g status-left ""
set -g status-right " %H:%M "


##### ─────────────────────────────────────────
##### Theme — COOL / BLUE (no orange)
##### ─────────────────────────────────────────

# Accent colors (matched to your theme vibe)
set -g @accent "#7aa2f7"   # focused window
set -g @cool   "#7dcfff"   # active pane border

# Transparent / ethereal bar
set -g status-style "bg=default,fg=colour250"

# Inactive windows
setw -g window-status-style "bg=default,fg=colour244"
setw -g window-status-format " #I:#W "

# Active window highlight
setw -g window-status-current-style "bg=default,fg=#{@accent},bold"
setw -g window-status-current-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=#{@cool}"

# Messages / copy mode styling
set -g message-style "bg=default,fg=colour252"
set -g mode-style "bg=default,fg=#{@accent}"


##### ─────────────────────────────────────────
##### Quality-of-life defaults
##### ─────────────────────────────────────────

# Better key support
set -g xterm-keys on

# Rename window automatically based on program
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"
